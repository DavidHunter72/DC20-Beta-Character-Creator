<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC20 Beta 0.10 — Character Creator</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f0;--bg3:#ececec;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:#d0d0d0;--border2:#b0b0b0;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --green:#1D9E75;--green-bg:#E1F5EE;--green-text:#0F6E56;
  --purple:#7F77DD;--purple-bg:#EEEDFE;--purple-text:#534AB7;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;
  --coral-bg:#FAECE7;--coral-text:#993C1D;
  --radius:8px;--radius-lg:12px;
  color-scheme:light dark;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1e1e1e;--bg2:#2a2a2a;--bg3:#333;
    --text:#e8e8e8;--text2:#aaa;--text3:#777;
    --border:#444;--border2:#555;
    --blue-bg:#0c2540;--blue-text:#7ab8f5;
    --green-bg:#062a1e;--green-text:#5ecba5;
    --purple-bg:#1a1840;--purple-text:#a8a2f0;
    --amber-bg:#2a1e00;--amber-text:#e8b86d;
    --coral-bg:#2a1008;--coral-text:#f0a080;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;padding:1rem}
.app{max-width:700px;margin:0 auto;background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);overflow:hidden}
.header{padding:1.5rem 1.5rem 1rem;border-bottom:1.5px solid var(--border);background:var(--bg2)}
.header h1{font-size:22px;font-weight:600;letter-spacing:0.5px}
.header p{font-size:13px;color:var(--text2);margin-top:4px}
.step-bar-wrap{padding:0 1.5rem;background:var(--bg2);border-bottom:0.5px solid var(--border)}
.step-bar{display:flex;gap:3px;padding-bottom:10px}
.step-pip{flex:1;height:4px;background:var(--border);border-radius:2px;cursor:pointer;transition:background .2s;min-width:0}
.step-pip.done{background:var(--green)}
.step-pip.active{background:var(--blue)}
.step-label{font-size:11px;color:var(--text2);padding:6px 0 8px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.content{padding:1.25rem 1.5rem}
.panel{display:none}.panel.active{display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:520px){.grid2,.grid3{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:1fr 1fr}}
.card-pick{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:10px 12px;cursor:pointer;transition:border-color .15s,background .15s;user-select:none}
.card-pick:hover{border-color:var(--border2)}
.card-pick.selected{border-color:var(--blue);background:var(--blue-bg)}
.card-pick .name{font-size:13px;font-weight:600;margin-bottom:2px}
.card-pick .sub{font-size:11px;color:var(--text2);line-height:1.4}
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:4px;vertical-align:middle;font-weight:500}
.b-paragon{background:var(--coral-bg);color:var(--coral-text)}
.b-martial{background:var(--green-bg);color:var(--green-text)}
.b-spell{background:var(--purple-bg);color:var(--purple-text)}
.b-hybrid{background:var(--amber-bg);color:var(--amber-text)}
.sec-title{font-size:16px;font-weight:600;margin-bottom:8px}
.sec-sub{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5}
.attr-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.attr-name{font-size:14px;font-weight:600;width:100px;flex-shrink:0}
.attr-desc{font-size:12px;color:var(--text2);flex:1}
.attr-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
.attr-ctrl button{width:28px;height:28px;border:0.5px solid var(--border2);background:var(--bg3);border-radius:6px;cursor:pointer;font-size:18px;line-height:1;color:var(--text);transition:background .1s}
.attr-ctrl button:hover:not(:disabled){background:var(--border)}
.attr-ctrl button:disabled{opacity:0.3;cursor:not-allowed}
.attr-val{font-size:16px;font-weight:700;width:32px;text-align:center}
.points-left{font-size:13px;color:var(--text2);margin-bottom:14px;padding:8px 12px;background:var(--blue-bg);border-radius:var(--radius);color:var(--blue-text)}
.skill-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;padding:6px 10px;background:var(--bg2);border:0.5px solid var(--border);border-radius:6px}
.skill-name{font-size:13px;font-weight:500;flex:1}
.skill-attr{font-size:11px;color:var(--text2);width:80px;flex-shrink:0}
.skill-ctrl{display:flex;align-items:center;gap:5px;flex-shrink:0}
.skill-ctrl button{width:22px;height:22px;border:0.5px solid var(--border2);background:var(--bg3);border-radius:4px;cursor:pointer;font-size:14px;color:var(--text)}
.skill-ctrl button:disabled{opacity:0.3;cursor:not-allowed}
.skill-val{font-size:13px;font-weight:600;width:22px;text-align:center}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);display:inline-block;margin:0 1px}
.dot.on{background:var(--blue)}
.tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.tab{padding:5px 10px;border:0.5px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;background:var(--bg2);color:var(--text2);transition:all .15s;user-select:none}
.tab:hover{border-color:var(--border2)}
.tab.active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue-text);font-weight:600}
.spell-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px;cursor:pointer;transition:border-color .15s}
.spell-card:hover{border-color:var(--border2)}
.spell-card.selected{border-color:var(--purple);background:var(--purple-bg)}
.spell-card .sname{font-size:13px;font-weight:600}
.spell-card .smeta{font-size:11px;color:var(--text2);margin-top:2px}
.stag{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;background:var(--bg3);color:var(--text2);margin:2px 2px 0 0;border:0.5px solid var(--border)}
.talent-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;cursor:pointer;margin-bottom:6px;transition:border-color .15s,background .15s}
.talent-card:hover{border-color:var(--border2)}
.talent-card.selected{border-color:var(--green);background:var(--green-bg)}
.talent-card .tname{font-size:13px;font-weight:600}
.talent-card .tdesc{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.4}
.sheet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
@media(max-width:520px){.sheet-grid{grid-template-columns:1fr 1fr}}
.stat-box{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px;text-align:center}
.stat-label{font-size:10px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px;font-weight:600}
.stat-value{font-size:22px;font-weight:700}
.stat-sub{font-size:10px;color:var(--text3);margin-top:2px}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid var(--border)}
button.back-btn{padding:8px 18px;border-radius:var(--radius);font-size:14px;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);transition:background .1s}
button.back-btn:hover{background:var(--bg3)}
button.next-btn{padding:8px 22px;border-radius:var(--radius);font-size:14px;cursor:pointer;border:none;background:var(--blue);color:#fff;font-weight:600;transition:opacity .15s}
button.next-btn:disabled{opacity:0.35;cursor:not-allowed}
.info-box{background:var(--blue-bg);border:0.5px solid var(--blue);border-radius:var(--radius);padding:10px 12px;font-size:13px;color:var(--blue-text);margin-bottom:12px}
.sec-break{border-top:0.5px solid var(--border);margin:14px 0}
.char-input{width:100%;font-size:15px;padding:9px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);margin-bottom:10px;transition:border-color .15s}
.char-input:focus{outline:none;border-color:var(--blue)}
textarea.char-input{min-height:90px;resize:vertical;font-family:inherit;font-size:13px}
.subclass-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.sc-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;cursor:pointer;transition:border-color .15s,background .15s}
.sc-card:hover{border-color:var(--border2)}
.sc-card.selected{border-color:var(--blue);background:var(--blue-bg)}
.sc-card .sname{font-size:13px;font-weight:600}
.sc-card .sdesc{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.4}
.equip-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:6px;margin-bottom:5px}
.equip-check{width:16px;height:16px;cursor:pointer;accent-color:var(--blue);flex-shrink:0}
.equip-label{font-size:13px;font-weight:500;flex:1}
.equip-sub{font-size:11px;color:var(--text2)}
.sheet-sec{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px}
.sheet-sec h3{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px}
.sheet-name{font-size:20px;font-weight:700;margin-bottom:3px}
.sheet-meta{font-size:13px;color:var(--text2)}
.list-item{font-size:13px;padding:3px 0;border-bottom:0.5px solid var(--border)}
.list-item:last-child{border-bottom:none}
.final-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.export-btn{width:100%;padding:10px;border-radius:var(--radius);font-size:14px;cursor:pointer;font-weight:600;transition:opacity .15s}
.export-btn.primary{background:var(--blue);color:#fff;border:none}
.export-btn.secondary{background:var(--bg2);color:var(--text);border:0.5px solid var(--border2)}
.export-btn:hover{opacity:0.85}
.scrollable{max-height:350px;overflow-y:auto;padding-right:2px}
.tip{font-size:11px;color:var(--text3);font-style:italic;margin-top:4px}
.lbl{font-size:13px;font-weight:600;margin-bottom:6px;margin-top:12px}
label.lbl{display:block}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:var(--radius-lg);font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>⚔️ DC20 Beta 0.10 — Character Creator</h1>
    <p>Build your Level 1 hero step by step · Based on the DC20 Beta 0.10 ruleset by The Dungeon Coach</p>
  </div>
  <div class="step-bar-wrap">
    <div class="step-label" id="stepLabel"></div>
    <div class="step-bar" id="stepBar"></div>
  </div>
  <div class="content">
    <div id="panels"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STEPS = ["Concept","Ancestry","Class","Attributes","Background","Skills & Trades","Equipment","Spells & Maneuvers","Talents","Character Sheet"];

const ANCESTRIES = [
  {id:"human",name:"Human",desc:"Adaptable and driven. Gain an Attribute increase, Skill Expertise, and Human Resolve.",traits:"Attribute +1, Skill Expertise, Human Resolve, Undying (0)"},

  {id:"leshy",name:"Leshy",desc:"Plant-like being with natural regeneration, nature affinity, and physical resilience.",traits:"Plant Type, Natural Regen, Entangle Immunity, Nature Bond"}
];

const CLASSES = [
  {id:"barbarian",name:"Barbarian",type:"martial",hp:10,sp:1,mp:0,desc:"Primal warrior fueled by Rage. Deal bonus damage, gain an elemental aura, and endure through sheer fury.",subclasses:[
    {id:"elemental",name:"Elemental Fury",desc:"Surround yourself with an elemental aura (fire, cold, lightning, or physical). Allies and enemies feel its power.",paragon:true},
    {id:"spirit",name:"Spirit Guardian",desc:"Ancestral spirits protect allies with a mystical aura, shoves, and defensive maneuvers from within range.",paragon:false}
  ]},
  {id:"bard",name:"Bard",type:"spell",hp:6,sp:0,mp:6,desc:"Artistic spellcaster inspiring allies through performance, manipulating minds, and casting with Musical or Visual magic.",subclasses:[
    {id:"eloquence",name:"Eloquence",desc:"Master of charm — enthrall foes, redirect attacks against you, and punish Charmed targets who snap out of it.",paragon:true},
    {id:"jester",name:"Jester",desc:"Antagonize and distract enemies. Turn enemy failures into ally advantages through pratfalls and heckling.",paragon:false}

  {id:"champion",name:"Champion",type:"martial",hp:9,sp:1,mp:0,desc:"Versatile martial hero with Tactical Dice, Adaptive Tactics, and Second Wind. Master of combat styles.",subclasses:[

  ]},
  {id:"commander",name:"Commander",type:"martial",hp:8,sp:1,mp:0,desc:"Battlefield leader inspiring allies through a Commanding Aura and Commander's Call tactical commands.",subclasses:[
    {id:"crusader",name:"Crusader",desc:"Aura of Courage, Protective Orders on each Commander's Call, and restoring bloodied allies with Rally.",paragon:true},
    {id:"warlord",name:"Warlord",desc:"Offensive Tactics: Morale Breaker on free Intimidate, +1 flanking damage, and Priority Target aura option.",paragon:false}
  ]},
  {id:"druid",name:"Druid",type:"spell",hp:7,sp:0,mp:6,desc:"Primal shapeshifter using Wild Form to become beasts and casting nature magic in a Druid Domain.",subclasses:[
    {id:"phoenix",name:"Phoenix",desc:"Wield fire to destroy and cleanse. Transform into Fire Elementals. Rolling Wild Fire scorches movement.",paragon:true},
    {id:"rampant",name:"Rampant Growth",desc:"Overgrowth as Plant creatures, Vineguard cover for allies, and Thorny Grasp on failed saves.",paragon:false}

    {id:"tumor",name:"Aberrant Tumor",desc:"Psychic Hunter's Mark with ADV on Analyze Creature. Unreadable mind and Psychic Resistance (1).",paragon:false}
  ]},
  {id:"monk",name:"Monk",type:"martial",hp:8,sp:1,mp:0,desc:"Disciplined martial artist mastering Monk Stances, Ki Points, and devastating Unarmed Strikes.",subclasses:[

    {id:"witch",name:"Witch",desc:"Coven's Gift — Curse Spell Tag access. Hex Enhancements: Bewitching, Reaping, or Vermin Hex on any spell.",paragon:false}
  ]}
];

const ATTRIBUTES = [
  {id:"might",name:"Might",desc:"Physical power • HP bonus • Area Defense"},
  {id:"agility",name:"Agility",desc:"Speed • Jump distance • Precision Defense"},
  {id:"charisma",name:"Charisma",desc:"Social influence • Grit Points • Area Defense"},
  {id:"intelligence",name:"Intelligence",desc:"Skill points • Precision Defense • Knowledge"}
];

const SKILLS = [
  {id:"athletics",name:"Athletics",attr:"Might"},{id:"intimidation",name:"Intimidation",attr:"Might"},
  {id:"acrobatics",name:"Acrobatics",attr:"Agility"},{id:"stealth",name:"Stealth",attr:"Agility"},
  {id:"trickery",name:"Trickery",attr:"Agility"},{id:"animal",name:"Animal Handling",attr:"Charisma"},
  {id:"influence",name:"Influence",attr:"Charisma"},{id:"performance",name:"Performance",attr:"Charisma"},
  {id:"awareness",name:"Awareness",attr:"Intelligence"},{id:"history",name:"History",attr:"Intelligence"},
  {id:"insight",name:"Insight",attr:"Intelligence"},{id:"investigation",name:"Investigation",attr:"Intelligence"},
  {id:"medicine",name:"Medicine",attr:"Intelligence"},{id:"nature",name:"Nature",attr:"Intelligence"},
  {id:"religion",name:"Religion",attr:"Intelligence"},{id:"survival",name:"Survival",attr:"Intelligence"}
];

const TRADES = [
  {id:"blacksmith",name:"Blacksmith"},{id:"jeweler",name:"Jeweler"},{id:"leatherworker",name:"Leatherworker"},
  {id:"tinkerer",name:"Tinkerer"},{id:"alchemy",name:"Alchemy"},{id:"cooking",name:"Cooking"},
  {id:"herbalism",name:"Herbalism"},{id:"cartography",name:"Cartography"}
];

const SPELLS = [

function pm(){return Math.max(C.attrs.might,C.attrs.agility,C.attrs.charisma,C.attrs.intelligence)}
function getCls(){return CLASSES.find(c=>c.id===C.classId)||null}
function calcHP(){const cl=getCls();return cl?cl.hp+C.attrs.might:8+C.attrs.might}
function calcPD(){return 8+1+C.attrs.agility+C.attrs.intelligence}
function calcAD(){return 8+1+C.attrs.might+C.attrs.charisma}
function calcSaveDC(){return 14}
function totalSP(){return 5+C.attrs.intelligence}
function spentSP(){return Object.values(C.skills).reduce((a,b)=>a+b,0)}
function spentTP(){return Object.values(C.trades).reduce((a,b)=>a+b,0)}
function attrSpent(){return Object.values(C.attrs).reduce((a,b)=>a+(b+2),0)}
function attrLeft(){return 12-attrSpent()}

function renderAll(){
  renderStepBar();
  const p=document.getElementById("panels");
  p.innerHTML='';
  const d=document.createElement("div");
  d.className="panel active";
  d.innerHTML=getStep(C.step);
  p.appendChild(d);
}

function renderStepBar(){
  document.getElementById("stepBar").innerHTML=STEPS.map((s,i)=>`<div class="step-pip ${i<C.step?'done':i===C.step?'active':''}" onclick="goTo(${i})" title="${s}"></div>`).join('');
  document.getElementById("stepLabel").textContent=`Step ${C.step+1} of ${STEPS.length}: ${STEPS[C.step]}`;
}

function goTo(n){C.step=n;renderAll()}
function nav(d){C.step=Math.max(0,Math.min(STEPS.length-1,C.step+d));renderAll()}

function navBtns(back,canNext){
  return `<div class="nav-row">
    ${back?`<button class="back-btn" onclick="nav(-1)">← Back</button>`:`<div></div>`}
    <button class="next-btn" onclick="nav(1)" ${!canNext?'disabled':''}>Next →</button>
  </div>`;
}

function getStep(s){
  if(s===0)return s0();
  if(s===1)return s1();
  if(s===2)return s2();
  if(s===3)return s3();
  if(s===4)return s4();
  if(s===5)return s5();
  if(s===6)return s6();
  if(s===7)return s7();
  if(s===8)return s8();
  if(s===9)return s9();
  return "";
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// Event handlers
window.pickAnc=(n,id)=>{if(n===1)C.ancestry1=C.ancestry1===id?null:id;else C.ancestry2=C.ancestry2===id?null:id;renderAll()};
window.pickCls=(id)=>{C.classId=id;C.subclassId=null;renderAll()};
window.pickSC=(id)=>{C.subclassId=C.subclassId===id?null:id;renderAll()};
window.filterCls=(f)=>{C._classFilter=f;renderAll()};
window.filterSpells=(f)=>{C._spellFilter=f;renderAll()};
window.filterTalents=(f)=>{C._talentFilter=f;renderAll()};
window.pickBg=(id)=>{C.background=id;renderAll()};
window.chAttr=(id,d)=>{
  const v=C.attrs[id], nv=Math.max(-2,Math.min(3,v+d));
  if(d>0&&attrLeft()<=0)return;
  C.attrs[id]=nv; renderAll();
};
window.chSkill=(id,d)=>{
  const v=C.skills[id]||0, lSP=totalSP()-spentSP();
  if(d>0&&lSP<=0)return;
  C.skills[id]=Math.max(0,Math.min(1,v+d)); renderAll();
};
window.chTrade=(id,d)=>{
  const v=C.trades[id]||0, lTP=3-spentTP();
  if(d>0&&lTP<=0)return;
  C.trades[id]=Math.max(0,Math.min(1,v+d)); renderAll();
};
window.toggleEq=(id)=>{
  const i=C.equipment.indexOf(id);
  if(i>=0)C.equipment.splice(i,1);else C.equipment.push(id);
  const el=document.getElementById('eq-'+id);
  if(el)el.checked=C.equipment.includes(id);
};
window.toggleSpell=(id,max)=>{
  const i=C.spells.indexOf(id);
  if(i>=0)C.spells.splice(i,1);else if(C.spells.length<max)C.spells.push(id);
  renderAll();
};
window.toggleMan=(id,max)=>{
  const i=C.maneuvers.indexOf(id);
  if(i>=0)C.maneuvers.splice(i,1);else if(C.maneuvers.length<max)C.maneuvers.push(id);
  renderAll();
};
window.toggleTalent=(id)=>{
  const i=C.talents.indexOf(id);
  if(i>=0)C.talents.splice(i,1);else if(C.talents.length<1)C.talents.push(id);
  renderAll();
};
window.switchSkillTab=(t)=>{C._skillTab=t;renderAll()};
window.switchEqTab=(t)=>{C._eqTab=t;renderAll()};

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

window.downloadChar=()=>{
  const cl=getCls();
  const a1=ANCESTRIES.find(a=>a.id===C.ancestry1);
  const a2=ANCESTRIES.find(a=>a.id===C.ancestry2);
  const bg=BACKGROUNDS.find(b=>b.id===C.background);
  const sc=cl&&cl.subclasses.find(s=>s.id===C.subclassId);
  const data={
    system:"DC20 Beta 0.10",
    name:C.name||"Unnamed",
    pronouns:C.pronouns,
    concept:C.concept,
    level:1,
    ancestry:{primary:a1?a1.name:null,secondary:a2?a2.name:null},
    class:{name:cl?cl.name:null,type:cl?cl.type:null,subclass:sc?sc.name:null},
    background:bg?bg.name:null,
    attributes:C.attrs,
    stats:{hp:calcHP(),pd:calcPD(),ad:calcAD(),saveDC:14,attackCheck:"+4",primeMod:pm(),gritPoints:Math.max(0,2+C.attrs.charisma),sp:cl?cl.sp:0,mp:cl?cl.mp:0,restPoints:calcHP()},
    skills:Object.fromEntries(Object.entries(C.skills).filter(([,v])=>v>0).map(([k,v])=>[SKILLS.find(s=>s.id===k)?.name||k,v])),
    trades:Object.fromEntries(Object.entries(C.trades).filter(([,v])=>v>0).map(([k,v])=>[TRADES.find(t=>t.id===k)?.name||k,v])),
    equipment:C.equipment.map(id=>EQUIPMENT.find(e=>e.id===id)?.name||id),
    spells:C.spells.map(id=>SPELLS.find(s=>s.id===id)?.name||id),
    maneuvers:C.maneuvers.map(id=>MANEUVERS.find(m=>m.id===id)?.name||id),
    talents:C.talents.map(id=>TALENTS.find(t=>t.id===id)?.name||id)
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`${(C.name||'character').replace(/\s+/g,'_')}_dc20.json`;a.click();
  URL.revokeObjectURL(url);
  toast('Character JSON downloaded!');
};

.b-m{background:rgba(255,255,255,0.15);color:#fff}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:#f0f0e8}
.stat{padding:16px;text-align:center;border-right:1px solid #ddd;border-bottom:1px solid #ddd}
.stat:nth-child(4n){border-right:none}
.stat-n{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:#666;font-weight:700;margin-bottom:4px}
.stat-v{font-size:26px;font-weight:800;color:#1a2a4a}
.stat-s{font-size:10px;color:#999;margin-top:2px}
.section{padding:1.25rem 1.5rem;border-bottom:1px solid #eee}
.section h2{font-size:12px;text-transform:uppercase;letter-spacing:0.7px;color:#666;font-weight:700;margin-bottom:10px}
.attr-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.attr-box{background:#f5f5f0;border-radius:8px;padding:10px;text-align:center}
.attr-box .n{font-size:11px;color:#666;font-weight:600;text-transform:uppercase;margin-bottom:2px}
.attr-box .v{font-size:20px;font-weight:800;color:#1a2a4a}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.4px;color:#666;padding:6px 8px;border-bottom:2px solid #ddd;font-weight:700}
td{padding:6px 8px;border-bottom:1px solid #eee;vertical-align:top}
tr:last-child td{border-bottom:none}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:11px;padding:2px 7px;border-radius:10px;background:#eee;color:#555}
.footer{text-align:center;font-size:11px;color:#999;padding:1rem;background:#f9f9f5}
@media print{body{background:#fff;padding:0}.page{box-shadow:none;border:none}}
@media(max-width:600px){.stats-grid{grid-template-columns:1fr 1fr}.attr-grid{grid-template-columns:1fr 1fr}}
</style></head><body>
<div class="page">
<div class="hero">
  <h1>${esc(C.name||'Unnamed Hero')}</h1>
  <div class="meta">${a1?a1.name:'—'}${a2?' / '+a2.name:''} <span class="badge b-m">${cl?cl.name:'—'}</span>${sc?` <span class="badge b-m">${sc.name}</span>`:''} · Level 1</div>
  <div class="meta">${bg?bg.name:'—'}${C.pronouns?' · '+C.pronouns:''}</div>
  ${C.concept?`<div class="concept">"${esc(C.concept.substring(0,200))}${C.concept.length>200?'…':''}"</div>`:''}
</div>
<div class="stats-grid">
  <div class="stat"><div class="stat-n">Max HP</div><div class="stat-v">${hp}</div><div class="stat-s">Class + Might</div></div>
  <div class="stat"><div class="stat-n">Precision Defense</div><div class="stat-v">${pd}</div><div class="stat-s">8+CM+Agi+Int</div></div>
  <div class="stat"><div class="stat-n">Area Defense</div><div class="stat-v">${ad}</div><div class="stat-s">8+CM+Mgt+Cha</div></div>
  <div class="stat"><div class="stat-n">Save DC</div><div class="stat-v">14</div><div class="stat-s">10+CM+Prime</div></div>
  <div class="stat"><div class="stat-n">Prime Modifier</div><div class="stat-v">${pm_>=0?'+'+pm_:pm_}</div><div class="stat-s">Highest attr</div></div>
  <div class="stat"><div class="stat-n">Attack Check</div><div class="stat-v">+4</div><div class="stat-s">CM + Prime</div></div>
  <div class="stat"><div class="stat-n">Grit Points</div><div class="stat-v">${grit}</div><div class="stat-s">2 + Charisma</div></div>
  <div class="stat"><div class="stat-n">SP / MP</div><div class="stat-v">${sp_}/${mp_}</div><div class="stat-s">Stamina/Mana</div></div>
  <div class="stat"><div class="stat-n">Move Speed</div><div class="stat-v">5</div><div class="stat-s">Spaces</div></div>
  <div class="stat"><div class="stat-n">Jump Distance</div><div class="stat-v">${jump}</div><div class="stat-s">Spaces</div></div>
  <div class="stat"><div class="stat-n">Rest Points</div><div class="stat-v">${hp}</div><div class="stat-s">= Max HP</div></div>
  <div class="stat"><div class="stat-n">Death's Door</div><div class="stat-v">−${pm_>=0?pm_:Math.abs(pm_)}</div><div class="stat-s">= Prime Mod</div></div>
</div>
<div class="section">
  <h2>Attributes &amp; Saves</h2>
  <div class="attr-grid">
  ${ATTRIBUTES.map(a=>`<div class="attr-box"><div class="n">${a.name}</div><div class="v">${C.attrs[a.id]>=0?'+'+C.attrs[a.id]:C.attrs[a.id]}</div></div>`).join('')}
  </div>
</div>
${skillList||tradeList?`<div class="section">
  <h2>Skills &amp; Trades</h2>
  ${skillList?`<div style="margin-bottom:6px"><strong style="font-size:12px">Skills (Novice):</strong> ${skillList}</div>`:''}
  ${tradeList?`<div><strong style="font-size:12px">Trades (Novice):</strong> ${tradeList}</div>`:''}
</div>`:''}
${eqRows?`<div class="section"><h2>Equipment</h2><table><thead><tr><th>Item</th><th>Type</th><th>Properties</th></tr></thead><tbody>${eqRows}</tbody></table></div>`:''}
${spellRows?`<div class="section"><h2>Spells Known</h2><table><thead><tr><th>Spell</th><th>School</th><th>Cost</th><th>Range</th></tr></thead><tbody>${spellRows}</tbody></table></div>`:''}
${manRows?`<div class="section"><h2>Maneuvers Known</h2><table><thead><tr><th>Maneuver</th><th>Type</th><th>Cost</th><th>Effect</th></tr></thead><tbody>${manRows}</tbody></table></div>`:''}
${talentRows?`<div class="section"><h2>Talents</h2><table><thead><tr><th>Talent</th><th>Type</th><th>Description</th></tr></thead><tbody>${talentRows}</tbody></table></div>`:''}
<div class="footer">DC20 Beta 0.10 by The Dungeon Coach · Character created with DC20 Character Creator · ${new Date().toLocaleDateString()}</div>
</div></body></html>`;

  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`${(C.name||'character').replace(/\s+/g,'_')}_dc20_sheet.html`;a.click();
  URL.revokeObjectURL(url);
  toast('HTML character sheet downloaded!');
};

renderAll();
</script>
</body>
</html>
