<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC20 Beta 0.10 — Character Creator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f4f0;--bg3:#eceae4;
  --text:#1a1a1a;--text2:#5a5a5a;--text3:#999;
  --border:#d0cfc8;--border2:#b0afa8;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-dark:#185FA5;
  --green:#1D9E75;--green-bg:#E1F5EE;--green-dark:#0F6E56;
  --purple:#7F77DD;--purple-bg:#EEEDFE;--purple-dark:#534AB7;
  --amber-bg:#FAEEDA;--amber-dark:#854F0B;
  --coral-bg:#FAECE7;--coral-dark:#993C1D;
  --red:#c0392b;
  --dc-purple:#5c3d8f;--dc-red:#c0392b;--dc-gold:#c9a84c;
  --r:8px;--rlg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1e1d1a;--bg2:#252420;--bg3:#2e2c28;
    --text:#e8e6e0;--text2:#a0a098;--text3:#666;
    --border:#3a3830;--border2:#504e46;
    --blue-bg:#0c2540;--blue-dark:#7ab8f5;
    --green-bg:#062a1e;--green-dark:#5ecba5;
    --purple-bg:#1a1840;--purple-dark:#a8a2f0;
    --amber-bg:#2a1e00;--amber-dark:#e8b86d;
    --coral-bg:#2a1008;--coral-dark:#f0a080;
    --dc-gold:#d4b86a;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;padding:1rem}
.app{max-width:720px;margin:0 auto;background:var(--bg);border-radius:var(--rlg);border:0.5px solid var(--border);overflow:hidden;box-shadow:0 2px 20px rgba(0,0,0,.12)}
.hdr{padding:1.25rem 1.5rem 1rem;border-bottom:2px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:12px}
.hdr-logo{font-size:28px;line-height:1}
.hdr h1{font-size:20px;font-weight:700;letter-spacing:.3px}
.hdr p{font-size:12px;color:var(--text2);margin-top:2px}
.step-wrap{padding:0 1.5rem;background:var(--bg2);border-bottom:0.5px solid var(--border)}
.step-lbl{font-size:10px;color:var(--text2);padding:6px 0 4px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.step-bar{display:flex;gap:3px;padding-bottom:10px}
.pip{flex:1;height:4px;background:var(--border);border-radius:2px;cursor:pointer;transition:background .2s;min-width:0}
.pip.done{background:var(--green)}
.pip.active{background:var(--blue)}
.content{padding:1.25rem 1.5rem}
.panel{display:none}.panel.active{display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:500px){.grid2,.grid3{grid-template-columns:1fr 1fr}}
.cp{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rlg);padding:10px 12px;cursor:pointer;transition:border-color .15s,background .15s;user-select:none}
.cp:hover{border-color:var(--border2)}
.cp.sel{border-color:var(--blue);background:var(--blue-bg)}
.cp .nm{font-size:13px;font-weight:700;margin-bottom:2px}
.cp .sb{font-size:11px;color:var(--text2);line-height:1.4}
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:4px;vertical-align:middle;font-weight:600}
.bm{background:var(--green-bg);color:var(--green-dark)}
.bs{background:var(--purple-bg);color:var(--purple-dark)}
.bh{background:var(--amber-bg);color:var(--amber-dark)}
.bp{background:var(--coral-bg);color:var(--coral-dark)}
.stit{font-size:16px;font-weight:700;margin-bottom:8px}
.ssub{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5}
.arow{display:flex;align-items:center;gap:10px;margin-bottom:8px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 12px}
.anm{font-size:14px;font-weight:700;width:105px;flex-shrink:0}
.ads{font-size:12px;color:var(--text2);flex:1}
.ac{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ac button{width:28px;height:28px;border:0.5px solid var(--border2);background:var(--bg3);border-radius:6px;cursor:pointer;font-size:18px;line-height:1;color:var(--text)}
.ac button:hover:not(:disabled){background:var(--border)}
.ac button:disabled{opacity:.3;cursor:not-allowed}
.av{font-size:16px;font-weight:800;width:32px;text-align:center}
.pts{font-size:13px;color:var(--blue-dark);margin-bottom:14px;padding:8px 12px;background:var(--blue-bg);border-radius:var(--r)}
.skrow{display:flex;align-items:center;gap:8px;margin-bottom:5px;padding:6px 10px;background:var(--bg2);border:0.5px solid var(--border);border-radius:6px}
.sknm{font-size:13px;font-weight:500;flex:1}
.skat{font-size:11px;color:var(--text2);width:90px;flex-shrink:0}
.skc{display:flex;align-items:center;gap:5px;flex-shrink:0}
.skc button{width:22px;height:22px;border:0.5px solid var(--border2);background:var(--bg3);border-radius:4px;cursor:pointer;font-size:14px;color:var(--text)}
.skc button:disabled{opacity:.3;cursor:not-allowed}
.skv{font-size:13px;font-weight:700;width:22px;text-align:center}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);display:inline-block;margin:0 1px}
.dot.on{background:var(--blue)}
.tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.tab{padding:5px 10px;border:0.5px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;background:var(--bg2);color:var(--text2);transition:all .15s;user-select:none}
.tab:hover{border-color:var(--border2)}
.tab.active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue-dark);font-weight:700}
.sc{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px;cursor:pointer;transition:border-color .15s}
.sc:hover{border-color:var(--border2)}
.sc.sel{border-color:var(--purple);background:var(--purple-bg)}
.sc .sn{font-size:13px;font-weight:700}
.sc .sm{font-size:11px;color:var(--text2);margin-top:2px}
.stag{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;background:var(--bg3);color:var(--text2);margin:2px 2px 0 0;border:0.5px solid var(--border)}
.tc{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;margin-bottom:6px;transition:border-color .15s,background .15s}
.tc:hover{border-color:var(--border2)}
.tc.sel{border-color:var(--green);background:var(--green-bg)}
.tc .tn{font-size:13px;font-weight:700}
.tc .td{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.4}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid var(--border)}
.bck{padding:8px 18px;border-radius:var(--r);font-size:14px;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text)}
.nxt{padding:8px 22px;border-radius:var(--r);font-size:14px;cursor:pointer;border:none;background:var(--blue);color:#fff;font-weight:700}
.nxt:disabled{opacity:.35;cursor:not-allowed}
.infobox{background:var(--blue-bg);border:0.5px solid var(--blue);border-radius:var(--r);padding:10px 12px;font-size:13px;color:var(--blue-dark);margin-bottom:12px}
.br{border-top:0.5px solid var(--border);margin:14px 0}
.inp{width:100%;font-size:15px;padding:9px 12px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);margin-bottom:10px}
.inp:focus{outline:none;border-color:var(--blue)}
textarea.inp{min-height:90px;resize:vertical;font-family:inherit;font-size:13px}
.scgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.scp{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:border-color .15s,background .15s}
.scp:hover{border-color:var(--border2)}
.scp.sel{border-color:var(--blue);background:var(--blue-bg)}
.scp .spn{font-size:13px;font-weight:700}
.scp .spd{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.4}
.eqrow{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:6px;margin-bottom:5px}
.eqck{width:16px;height:16px;cursor:pointer;accent-color:var(--blue);flex-shrink:0}
.eqlb{font-size:13px;font-weight:500;flex:1}
.eqsb{font-size:11px;color:var(--text2)}
.scroll{max-height:360px;overflow-y:auto;padding-right:2px}
.tip{font-size:11px;color:var(--text3);font-style:italic;margin-top:4px}
.lbl{font-size:13px;font-weight:700;margin-bottom:6px;margin-top:12px;display:block}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999}
.toast.show{opacity:1}
/* Level selector */
.lvl-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 14px}
.lvl-row label{font-size:14px;font-weight:700;flex:1}
.lvl-row select{padding:5px 10px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-size:14px;font-weight:700}
/* Sheet stats grid */
.sh-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
@media(max-width:480px){.sh-grid{grid-template-columns:1fr 1fr}}
.sh-stat{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:8px;text-align:center}
.sh-lbl{font-size:9px;color:var(--text2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.sh-val{font-size:20px;font-weight:800}
.sh-sub{font-size:10px;color:var(--text3);margin-top:1px}
.sh-sec{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rlg);padding:12px 14px;margin-bottom:8px}
.sh-sec h3{font-size:10px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}
.li{font-size:13px;padding:4px 0;border-bottom:0.5px solid var(--border)}
.li:last-child{border-bottom:none}
.sh-name{font-size:22px;font-weight:800;margin-bottom:3px}
.sh-meta{font-size:13px;color:var(--text2)}
.exp-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.ebtn{width:100%;padding:10px;border-radius:var(--r);font-size:14px;cursor:pointer;font-weight:700;transition:opacity .15s}
.ebtn.pri{background:var(--blue);color:#fff;border:none}
.ebtn.sec{background:var(--bg2);color:var(--text);border:0.5px solid var(--border2)}
.ebtn:hover{opacity:.85}
/* Progression table */
.prog-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.prog-table th{text-align:left;padding:5px 8px;border-bottom:2px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);font-weight:700}
.prog-table td{padding:5px 8px;border-bottom:0.5px solid var(--border);vertical-align:middle}
.prog-table tr.cur td{background:var(--blue-bg);font-weight:700;color:var(--blue-dark)}
.prog-table .hi{color:var(--green-dark);font-weight:700}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-logo">⚔️</div>
    <div>
      <h1>DC20 Beta 0.10 — Character Creator</h1>
      <p>Build your hero · Levels 1–10 · By The Dungeon Coach</p>
    </div>
  </div>
  <div class="step-wrap">
    <div class="step-lbl" id="sLbl"></div>
    <div class="step-bar" id="sBar"></div>
  </div>
  <div class="content"><div id="panels"></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
const STEPS=["Concept","Ancestry","Class","Attributes","Background","Skills & Trades","Equipment","Spells & Maneuvers","Talents","Level & Progression","Character Sheet"];

// Progression table per level
const PROG=[
  {lv:1,cm:1,attrCap:3,skCap:"Novice",attrPts:0,skPts:0,trPts:0,features:"Class Features"},
  {lv:2,cm:1,attrCap:3,skCap:"Novice",attrPts:0,skPts:0,trPts:0,features:"Class Features, Talent, Path"},
  {lv:3,cm:2,attrCap:3,skCap:"Novice",attrPts:1,skPts:1,trPts:1,features:"Subclass Features"},
  {lv:4,cm:2,attrCap:3,skCap:"Novice",attrPts:0,skPts:0,trPts:0,features:"Talent, +2 Ancestry Points, Path"},
  {lv:5,cm:3,attrCap:4,skCap:"Adept",attrPts:1,skPts:2,trPts:1,features:"Class Features"},
  {lv:6,cm:3,attrCap:4,skCap:"Adept",attrPts:0,skPts:1,trPts:0,features:"Subclass Features, Path"},
  {lv:7,cm:4,attrCap:4,skCap:"Adept",attrPts:0,skPts:0,trPts:0,features:"Talent, +2 Ancestry Points"},
  {lv:8,cm:4,attrCap:4,skCap:"Adept",attrPts:1,skPts:1,trPts:1,features:"Class Capstone, Path"},
  {lv:9,cm:5,attrCap:4,skCap:"Adept",attrPts:0,skPts:0,trPts:0,features:"Subclass Capstone"},
  {lv:10,cm:5,attrCap:5,skCap:"Expert",attrPts:1,skPts:2,trPts:1,features:"Epic Boon, Talent"}
];

function getLvRow(lv){return PROG[Math.min(lv,10)-1]}
function getCM(lv){return getLvRow(lv).cm}
function getTotalAttrPts(lv){return 12+PROG.slice(0,lv).reduce((a,r)=>a+r.attrPts,0)}
function getTotalSkPts(lv,intel){return (5+intel)+PROG.slice(0,lv).reduce((a,r)=>a+r.skPts,0)}
function getTotalTrPts(lv){return 3+PROG.slice(0,lv).reduce((a,r)=>a+r.trPts,0)}
function getAttrCap(lv){return getLvRow(lv).attrCap}
function getSkCap(lv){const c=getLvRow(lv).skCap;return c==="Novice"?1:c==="Adept"?2:3}

const ANCESTRIES=[
  {id:"human",name:"Human",desc:"Adaptable and driven. Attribute increase, Skill Expertise, and Human Resolve.",traits:"Attribute +1, Skill Expertise, Human Resolve, Undying (0)"},
  {id:"elf",name:"Elf",desc:"Agile and perceptive. Resist charm, avoid difficult terrain, full Dodge action.",traits:"Elven Will, Nimble, Agile Explorer, Discerning Sight (0)"},
  {id:"dwarf",name:"Dwarf",desc:"Hardy and stalwart. Resist poison, avoid impairment, endure through toughness.",traits:"Tough +1 HP, Toxic Fortitude, Physically Sturdy, Iron Stomach (0)"},
  {id:"halfling",name:"Halfling",desc:"Small but courageous. Resist fear, masterful disengage, beast friendship.",traits:"Small-Sized (−1), Elusive, Halfling Bravery, Halfling Endurance"},
  {id:"gnome",name:"Gnome",desc:"Clever escape artists. Resist grapple and mental effects, sharp perception.",traits:"Small-Sized (−1), Escape Artist, Magnified Vision, Mental Clarity"},
  {id:"orc",name:"Orc",desc:"Fierce and brutal. Rush into combat with temp HP, deal bonus damage on heavy hits.",traits:"Cursed Mind (−1), Orc Rush, Brutal Strikes, Tough +1 HP"},
  {id:"dragonborn",name:"Dragonborn",desc:"Draconic heritage grants breath weapon, elemental resistance, draconic presence.",traits:"Draconic Origin, Draconic Resistance, Draconic Breath Weapon"},
  {id:"angelborn",name:"Angelborn",desc:"Celestial lineage — holy light, divine clarity, glide speed.",traits:"Divine Glow (0), Celestial Resistance, Angelic Insight, Glide Speed"},
  {id:"fiendborn",name:"Fiendborn",desc:"Infernal origins — darkvision, elemental resistance, fiendish aura.",traits:"Fiendish Origin, Fiendish Resistance, Silver-Tongued, Fiendish Aura"},
  {id:"giantborn",name:"Giantborn",desc:"Towering and powerful. Increased effective size, huge HP, resist stun.",traits:"Tough +1 HP, Powerful Build, Unstoppable, Giant's Resolve"},
  {id:"goblin",name:"Goblin",desc:"Quick and sneaky. Small size, nimble escape, and surprising tricks.",traits:"Small-Sized (−1), Nimble Escape, Goblin Cunning, Darkvision"},
  {id:"beastkin",name:"Beastkin",desc:"Animalistic traits — natural weapons, keen senses, beast-like athleticism.",traits:"Natural Weapon, Keen Senses, Animal Form Affinity"},
  {id:"leshy",name:"Leshy",desc:"Plant-like being with regeneration, nature affinity, and physical resilience.",traits:"Plant Type, Natural Regen, Entangle Immunity, Nature Bond"}
];

const CLASSES=[
  {id:"barbarian",name:"Barbarian",type:"martial",hp:10,sp:1,mp:0,desc:"Primal warrior fueled by Rage and elemental power.",subclasses:[
    {id:"elemental",name:"Elemental Fury",desc:"Surround yourself with an elemental aura (fire/cold/lightning/physical) damaging foes around you.",paragon:true},
    {id:"spirit",name:"Spirit Guardian",desc:"Ancestral spirits protect allies with a mystical 5-Space aura and defensive maneuvers.",paragon:false}
  ]},
  {id:"bard",name:"Bard",type:"spell",hp:6,sp:0,mp:6,desc:"Artistic spellcaster inspiring allies through magical performance.",subclasses:[
    {id:"eloquence",name:"Eloquence",desc:"Master charm and deception — redirect attacks and punish Charmed targets.",paragon:true},
    {id:"jester",name:"Jester",desc:"Antagonize and distract enemies, turning their failures to your allies' advantage.",paragon:false}
  ]},
  {id:"champion",name:"Champion",type:"martial",hp:9,sp:1,mp:0,desc:"Versatile martial hero with Tactical Dice and Combat Styles.",subclasses:[
    {id:"hero",name:"Hero",desc:"Adrenaline Boost on Second Wind, cut through Physical Resistances, Unyielding spirit.",paragon:true},
    {id:"sentinel",name:"Sentinel",desc:"Steadfast protector — Deflect any attack on allies in your Melee Range.",paragon:false}
  ]},
  {id:"cleric",name:"Cleric",type:"spell",hp:7,sp:0,mp:6,desc:"Divine spellcaster channeling deity power through Cleric Orders.",subclasses:[
    {id:"inquisitor",name:"Inquisitor",desc:"Hunt heretics with iron resolve, brands that persist through damage.",paragon:true},
    {id:"priest",name:"Priest",desc:"Devoted healer converting excess healing to Temp HP, saving allies from death.",paragon:false}
  ]},
  {id:"commander",name:"Commander",type:"martial",hp:8,sp:1,mp:0,desc:"Battlefield leader inspiring allies through a Commanding Aura.",subclasses:[
    {id:"crusader",name:"Crusader",desc:"Aura of Courage, Protective Orders on every Commander's Call.",paragon:true},
    {id:"warlord",name:"Warlord",desc:"Offensive Tactics — Morale Breaker, flanking bonuses, Priority Target.",paragon:false}
  ]},
  {id:"druid",name:"Druid",type:"spell",hp:7,sp:0,mp:6,desc:"Primal shapeshifter using Wild Form and nature magic.",subclasses:[
    {id:"phoenix",name:"Phoenix",desc:"Wield fire to destroy and cleanse. Transform into Fire Elementals.",paragon:true},
    {id:"rampant",name:"Rampant Growth",desc:"Overgrowth as Plant creatures, Vineguard cover, Thorny Grasp on failed saves.",paragon:false}
  ]},
  {id:"hunter",name:"Hunter",type:"martial",hp:8,sp:1,mp:0,desc:"Expert survivalist marking prey and exploiting Favored Terrain.",subclasses:[
    {id:"slayer",name:"Monster Slayer",desc:"Hunt with alchemical Concoctions crafted from monster weaknesses.",paragon:true},
    {id:"tumor",name:"Aberrant Tumor",desc:"Psychic Hunter's Mark, unreadable mind, and Psychic Resistance (1).",paragon:false}
  ]},
  {id:"monk",name:"Monk",type:"martial",hp:8,sp:1,mp:0,desc:"Disciplined martial artist mastering Stances and Ki Points.",subclasses:[
    {id:"astral",name:"Astral Self",desc:"Manifest astral arms dealing Mystical damage, deflect Ranged Attacks within 2 Spaces.",paragon:true},
    {id:"tide",name:"Shifting Tide",desc:"Ebb and Flow between offensive and defensive stances fluidly.",paragon:false}
  ]},
  {id:"rogue",name:"Rogue",type:"martial",hp:7,sp:1,mp:0,desc:"Cunning striker with Debilitating Strikes and Cunning Action.",subclasses:[
    {id:"death",name:"Long Death",desc:"Thousand Cuts — Bleeding on immune creatures, ends only by save not HP.",paragon:true},
    {id:"swash",name:"Swashbuckler",desc:"Renegade Duelist — Riposte, Taunting Shot, expanded Cunning Action.",paragon:false}
  ]},
  {id:"sorcerer",name:"Sorcerer",type:"spell",hp:6,sp:0,mp:6,desc:"Natural-born spellcaster with Meta Magic and Overload.",subclasses:[
    {id:"angelic",name:"Angelic",desc:"Celestial Spark — radiant burst of healing/damage while Overloaded.",paragon:true},
    {id:"draconic",name:"Draconic",desc:"Draconic bloodline — scales, elemental affinity, enhanced breath.",paragon:false}
  ]},
  {id:"spellblade",name:"Spellblade",type:"hybrid",hp:7,sp:1,mp:2,desc:"Hybrid warrior binding spells to weapons via Spellstrike.",subclasses:[
    {id:"paladin",name:"Paladin",desc:"Holy Warrior — Aura of Protection, Divine Strike, Lay on Hands.",paragon:true},
    {id:"rune",name:"Rune Knight",desc:"Inscribe powerful magical runes on your Bound Weapon.",paragon:false}
  ]},
  {id:"warlock",name:"Warlock",type:"spell",hp:6,sp:0,mp:6,desc:"Pact-bound spellcaster wielding eldritch power through dark Contracts.",subclasses:[
    {id:"eldritch",name:"Eldritch",desc:"Otherworldly psychic gifts and Forbidden Knowledge from your patron.",paragon:true},
    {id:"fey",name:"Fey",desc:"Fey Aspect Condition, Fey Step on being Hit, Beguiling Bargain.",paragon:false}
  ]},
  {id:"wizard",name:"Wizard",type:"spell",hp:6,sp:0,mp:6,desc:"Scholarly spellcaster mastering Arcane Sigils across all schools.",subclasses:[
    {id:"portal",name:"Portal Mage",desc:"Connect Arcane Sigils as two-way portals. Cast through them.",paragon:true},
    {id:"witch",name:"Witch",desc:"Coven's Gift — Curse tags, Bewitching/Reaping/Vermin Hex enhancements.",paragon:false}
  ]}
];

const ATTRS=[
  {id:"might",name:"Might",desc:"Physical power · HP bonus · Area Defense"},

function pm(){return Math.max(...Object.values(C.attrs))}
function getCls(){return CLASSES.find(c=>c.id===C.classId)||null}
function calcHP(){
  const cl=getCls();const base=cl?cl.hp:8;
  const lvRow=getLvRow(C.level);
  // HP from Might + Class HP + any Might gained from level ups
  return base+C.attrs.might;
}
function calcCM(){return getCM(C.level)}
function calcPD(){return 8+calcCM()+C.attrs.agility+C.attrs.intelligence}
function calcAD(){return 8+calcCM()+C.attrs.might+C.attrs.charisma}
function calcDC(){return 10+calcCM()+pm()}
function calcAtk(){const v=calcCM()+pm();return v>=0?'+'+v:v}
function calcGrit(){return Math.max(0,2+C.attrs.charisma)}
function calcJump(){return Math.max(1,C.attrs.agility)}
function calcSP(){const cl=getCls();return cl?cl.sp:0}
function calcMP(){const cl=getCls();return cl?cl.mp:0}
function getAttrPtTotal(){return getTotalAttrPts(C.level)}
function getAttrSpent(){return Object.values(C.attrs).reduce((a,b)=>a+(b+2),0)}
function getAttrLeft(){return getAttrPtTotal()-getAttrSpent()}
function getSkPtTotal(){return getTotalSkPts(C.level,C.attrs.intelligence)}
function getSkSpent(){return Object.values(C.skills).reduce((a,b)=>a+b,0)}
function getSkLeft(){return getSkPtTotal()-getSkSpent()}
function getTrPtTotal(){return getTotalTrPts(C.level)}
function getTrSpent(){return Object.values(C.trades).reduce((a,b)=>a+b,0)}
function getTrLeft(){return getTrPtTotal()-getTrSpent()}
function maxSkillLvl(){return getSkCap(C.level)}

function renderAll(){
  const bar=document.getElementById("sBar");
  const lbl=document.getElementById("sLbl");
  bar.innerHTML=STEPS.map((s,i)=>`<div class="pip ${i<C.step?'done':i===C.step?'active':''}" onclick="goto(${i})" title="${s}"></div>`).join('');
  lbl.textContent=`Step ${C.step+1} of ${STEPS.length}: ${STEPS[C.step]}`;
  const p=document.getElementById("panels");
  p.innerHTML='';
  const d=document.createElement("div");
  d.className="panel active";
  d.innerHTML=getStep(C.step);
  p.appendChild(d);
}
function goto(n){C.step=n;renderAll()}
function nav(d){C.step=Math.max(0,Math.min(STEPS.length-1,C.step+d));renderAll()}
function nb(back,ok){
  return `<div class="nav">${back?`<button class="bck" onclick="nav(-1)">← Back</button>`:'<div></div>'}
  <button class="nxt" onclick="nav(1)" ${!ok?'disabled':''}>Next →</button></div>`;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500)}

function getStep(s){
  if(s===0)return s0();if(s===1)return s1();if(s===2)return s2();
  if(s===3)return s3();if(s===4)return s4();if(s===5)return s5();
  if(s===6)return s6();if(s===7)return s7();if(s===8)return s8();
  if(s===9)return s9();if(s===10)return s10();
  return "";
}

// ── Event handlers ─────────────────────────────────────────
window.pickAnc=(n,id)=>{if(n===1)C.ancestry1=C.ancestry1===id?null:id;else C.ancestry2=C.ancestry2===id?null:id;renderAll()};
window.pickCls=(id)=>{C.classId=id;C.subclassId=null;renderAll()};
window.pickSC=(id)=>{C.subclassId=C.subclassId===id?null:id;renderAll()};
window.fCls=(f)=>{C._cf=f;renderAll()};
window.fSp=(f)=>{C._sf=f;renderAll()};
window.fTal=(f)=>{C._tf=f;renderAll()};
window.pickBg=(id)=>{C.background=id;renderAll()};
window.setLv=(n)=>{C.level=n;renderAll()};
window.chA=(id,d)=>{
  const v=C.attrs[id],cap=getAttrCap(C.level),left=getAttrLeft();
  if(d>0&&(v>=cap||left<=0))return;
  C.attrs[id]=Math.max(-2,Math.min(cap,v+d));renderAll();
};
window.chSK=(id,d)=>{
  const v=C.skills[id]||0,max=maxSkillLvl(),left=getSkLeft();
  if(d>0&&(v>=max||left<=0))return;
  C.skills[id]=Math.max(0,Math.min(max,v+d));renderAll();
};
window.chTR=(id,d)=>{
  const v=C.trades[id]||0,max=maxSkillLvl(),left=getTrLeft();
  if(d>0&&(v>=max||left<=0))return;
  C.trades[id]=Math.max(0,Math.min(max,v+d));renderAll();
};
window.togEQ=(id)=>{
  const i=C.equipment.indexOf(id);if(i>=0)C.equipment.splice(i,1);else C.equipment.push(id);
  const el=document.getElementById('eq-'+id);if(el)el.checked=C.equipment.includes(id);
};
window.togSp=(id,max)=>{
  const i=C.spells.indexOf(id);if(i>=0)C.spells.splice(i,1);else if(C.spells.length<max)C.spells.push(id);
  renderAll();
};
window.togMn=(id,max)=>{
  const i=C.maneuvers.indexOf(id);if(i>=0)C.maneuvers.splice(i,1);else if(C.maneuvers.length<max)C.maneuvers.push(id);
  renderAll();
};
window.togTal=(id,max)=>{
  const i=C.talents.indexOf(id);if(i>=0)C.talents.splice(i,1);else if(C.talents.length<max)C.talents.push(id);
  renderAll();
};
window.swSK=(t)=>{C._skt=t;renderAll()};
window.swEQ=(t)=>{C._eqt=t;renderAll()};

// ── JSON Export ─────────────────────────────────────────
window.dlJSON=()=>{
  const cl=getCls(),a1=ANCESTRIES.find(a=>a.id===C.ancestry1),a2=ANCESTRIES.find(a=>a.id===C.ancestry2);
  const bg=BACKGROUNDS.find(b=>b.id===C.background),sc=cl&&cl.subclasses.find(s=>s.id===C.subclassId);
  const data={system:"DC20 Beta 0.10",name:C.name||"Unnamed",pronouns:C.pronouns,concept:C.concept,level:C.level,
    ancestry:{primary:a1?.name||null,secondary:a2?.name||null},
    class:{name:cl?.name||null,type:cl?.type||null,subclass:sc?.name||null},
    background:bg?.name||null,attributes:C.attrs,
    stats:{hp:calcHP(),pd:calcPD(),ad:calcAD(),saveDC:calcDC(),attackCheck:calcAtk(),combatMastery:calcCM(),primeMod:pm(),gritPoints:calcGrit(),sp:calcSP(),mp:calcMP(),restPoints:calcHP()},
    skills:Object.fromEntries(Object.entries(C.skills).filter(([,v])=>v>0).map(([k,v])=>[SKILLS.find(s=>s.id===k)?.name||k,v])),
    trades:Object.fromEntries(Object.entries(C.trades).filter(([,v])=>v>0).map(([k,v])=>[TRADES.find(t=>t.id===k)?.name||k,v])),
    equipment:C.equipment.map(id=>EQUIPMENT.find(e=>e.id===id)?.name||id),
    spells:C.spells.map(id=>SPELLS.find(s=>s.id===id)?.name||id),
    maneuvers:C.maneuvers.map(id=>MANEUVERS.find(m=>m.id===id)?.name||id),
    talents:C.talents.map(id=>TALENTS.find(t=>t.id===id)?.name||id)};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`${(C.name||'character').replace(/\s+/g,'_')}_dc20.json`;a.click();
  URL.revokeObjectURL(url);toast('JSON exported!');
};

// ── DC20-Styled HTML Sheet Export ─────────────────────────────────────────
window.dlSheet=()=>{
  const cl=getCls(),a1=ANCESTRIES.find(a=>a.id===C.ancestry1),a2=ANCESTRIES.find(a=>a.id===C.ancestry2);
  const bg=BACKGROUNDS.find(b=>b.id===C.background),sc=cl&&cl.subclasses.find(s=>s.id===C.subclassId);
  const hp=calcHP(),pd=calcPD(),ad=calcAD(),cm=calcCM(),dc=calcDC(),atk=calcAtk(),grit=calcGrit(),jump=calcJump();
  const sp=calcSP(),mp=calcMP();
  const skList=Object.keys(C.skills).filter(k=>C.skills[k]>0).map(k=>({name:SKILLS.find(s=>s.id===k)?.name||k,lv:C.skills[k],attr:SKILLS.find(s=>s.id===k)?.attr||''}));
  const trList=Object.keys(C.trades).filter(k=>C.trades[k]>0).map(k=>({name:TRADES.find(t=>t.id===k)?.name||k}));
  const skCap=getLvRow(C.level).skCap;
  const skBonus=getLvRow(C.level).skCap==="Novice"?2:getLvRow(C.level).skCap==="Adept"?4:6;
  const attrSave=a=>C.attrs[a]>=0?'+':''+String(C.attrs[a]+cm);
  const attrVal=a=>C.attrs[a]>=0?'+'+C.attrs[a]:String(C.attrs[a]);

  const spellRows=C.spells.map(id=>{const s=SPELLS.find(x=>x.id===id);return s?`
  <tr>
    <td class="sp-name">${s.name}</td>
    <td>${s.school}</td>
    <td>${s.src}</td>
    <td>${s.cost}</td>
    <td>${s.range}</td>
    <td class="sp-desc">${s.desc}</td>
  </tr>`:''}).join('');

  const manRows=C.maneuvers.map(id=>{const m=MANEUVERS.find(x=>x.id===id);return m?`
  <tr>
    <td class="sp-name">${m.name}</td>
    <td>${m.type}</td>
    <td>${m.cost}</td>
    <td class="sp-desc">${m.desc}</td>
  </tr>`:''}).join('');

  const talentRows=C.talents.map(id=>{const t=TALENTS.find(x=>x.id===id);return t?`
  <tr>
    <td class="sp-name">${t.name}</td>
    <td>${t.type}</td>
    <td class="sp-desc">${t.desc}</td>
  </tr>`:''}).join('');

  const eqRows=C.equipment.map(id=>{const e=EQUIPMENT.find(x=>x.id===id);return e?`
  <tr>
    <td class="sp-name">${e.name}</td>
    <td>${e.type}</td>
    <td class="sp-desc">${e.desc}</td>
  </tr>`:''}).join('');

  function box(label,val,sub=''){
    return `<div class="stat-box"><div class="box-lbl">${label}</div><div class="box-val">${val}</div>${sub?`<div class="box-sub">${sub}</div>`:''}</div>`;
  }
  function attrBox(name,id){
    return `<div class="attr-box">
      <div class="ab-name">${name}</div>
      <div class="ab-val">${attrVal(id)}</div>
      <div class="ab-save">Save: ${attrSave(id)}</div>
    </div>`;
  }

  const html=`<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${esc(C.name)||'Character'} — DC20 Character Sheet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
@page{margin:15mm}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:#f0ede6;color:#1a1a18;font-size:13px}
.page{max-width:900px;margin:0 auto;background:#fff;min-height:100vh}

/* ── Header Banner ── */
.banner{background:linear-gradient(135deg,#3a1f6b 0%,#5c3d8f 50%,#1a0f38 100%);color:#fff;padding:0}
.banner-inner{display:grid;grid-template-columns:auto 1fr;align-items:stretch}
.banner-left{padding:1.5rem;border-right:2px solid rgba(255,255,255,0.15);min-width:160px;display:flex;flex-direction:column;justify-content:center}
.banner-logo{font-size:36px;font-weight:900;letter-spacing:-1px;color:#fff;line-height:1}
.banner-logo span{color:#c9a84c}
.banner-sub{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.6;margin-top:4px}
.banner-right{padding:1.5rem 1.75rem;flex:1}
.char-name{font-size:28px;font-weight:800;letter-spacing:.3px;margin-bottom:4px}
.char-meta{font-size:13px;opacity:.8;margin-bottom:2px}
.char-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.ctag{font-size:10px;padding:3px 10px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.ctag-class{background:rgba(201,168,76,0.25);color:#f0d080;border:1px solid rgba(201,168,76,0.4)}
.ctag-type{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);border:1px solid rgba(255,255,255,0.2)}
.concept-text{font-size:12px;opacity:.6;font-style:italic;margin-top:8px;line-height:1.5;max-width:480px}

/* ── Section labels ── */
.section{padding:1rem 1.5rem;border-bottom:0.5px solid #e0ddd5}
.section-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#5c3d8f;border-bottom:2px solid #5c3d8f;padding-bottom:5px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';display:inline-block;width:4px;height:14px;background:#c9a84c;border-radius:2px;flex-shrink:0}

/* ── Combat stats grid ── */
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:0;border:1.5px solid #3a1f6b;border-radius:8px;overflow:hidden}
.stat-box{padding:10px 6px;text-align:center;border-right:0.5px solid #c8c4b8;position:relative}
.stat-box:last-child{border-right:none}
.box-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#888;font-weight:700;margin-bottom:4px;line-height:1.2}
.box-val{font-size:22px;font-weight:900;color:#3a1f6b;line-height:1}
.box-sub{font-size:9px;color:#aaa;margin-top:3px}
.stat-box.highlight .box-val{color:#c0392b}
.stat-box.highlight .box-lbl{color:#c0392b}

/* ── Secondary stats ── */
.sec-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.sec-box{background:#f5f3ee;border:0.5px solid #d8d5cc;border-radius:6px;padding:8px;text-align:center}
.sec-box .box-lbl{font-size:9px}
.sec-box .box-val{font-size:18px;font-weight:800;color:#1a1a18}

/* ── Attributes ── */
.attrs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.attr-box{background:#3a1f6b;border-radius:8px;padding:10px;text-align:center;color:#fff}
.ab-name{font-size:9px;text-transform:uppercase;letter-spacing:.8px;opacity:.7;font-weight:700;margin-bottom:6px}
.ab-val{font-size:26px;font-weight:900;line-height:1}
.ab-save{font-size:10px;opacity:.65;margin-top:4px;padding-top:4px;border-top:1px solid rgba(255,255,255,0.2)}

/* ── Skills ── */
.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.skill-row{display:flex;align-items:center;gap:8px;padding:5px 8px;background:#f9f7f3;border-radius:5px;border:0.5px solid #e5e2d8}
.sk-name{flex:1;font-size:12px;font-weight:600}
.sk-attr{font-size:10px;color:#999;width:65px}
.sk-dots{display:flex;gap:3px}
.sk-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid #3a1f6b}
.sk-dot.fill{background:#3a1f6b}
.sk-bonus{font-size:12px;font-weight:800;color:#3a1f6b;width:30px;text-align:right}

/* ── Tables ── */
table.dc20{width:100%;border-collapse:collapse;font-size:12px}
table.dc20 thead tr{background:#3a1f6b;color:#fff}
table.dc20 th{padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
table.dc20 td{padding:7px 10px;border-bottom:0.5px solid #eae7e0;vertical-align:top}
table.dc20 tr:last-child td{border-bottom:none}
table.dc20 tr:nth-child(even) td{background:#faf8f4}
.sp-name{font-weight:700}
.sp-desc{color:#555;font-size:11px}

/* ── Two column layout ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:0}
.two-col .section{border-right:0.5px solid #e0ddd5}
.two-col .section:last-child{border-right:none}

/* ── Footer ── */
.footer{background:#3a1f6b;color:rgba(255,255,255,0.5);text-align:center;font-size:10px;padding:10px;letter-spacing:.3px}
.footer span{color:rgba(255,255,255,0.8)}

/* ── Death's Door bubble ── */
.death-bubble{display:inline-block;background:#c0392b;color:#fff;border-radius:50%;width:38px;height:38px;line-height:38px;font-size:16px;font-weight:900;text-align:center}

/* Print */
@media print{body{background:#fff}.page{box-shadow:none}}
@media(max-width:600px){
  .stats-row{grid-template-columns:repeat(3,1fr)}
  .stat-box{border-bottom:0.5px solid #c8c4b8}
  .attrs-grid{grid-template-columns:1fr 1fr}
  .skills-grid{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="page">

<!-- BANNER -->
<div class="banner">
<div class="banner-inner">
<div class="banner-left">
  <div class="banner-logo">DC<span>20</span></div>
  <div class="banner-sub">Beta 0.10</div>
  <div style="margin-top:12px;font-size:10px;opacity:.55">Character Sheet</div>
</div>
<div class="banner-right">
  <div class="char-name">${esc(C.name)||'Unnamed Hero'}</div>
  <div class="char-meta">${a1?a1.name:'—'}${a2?' / '+a2.name:''} · Level ${C.level}</div>
  <div class="char-meta">${bg?bg.name:'—'}${C.pronouns?' · '+esc(C.pronouns):''}</div>
  <div class="char-tags">
    ${cl?`<span class="ctag ctag-class">${cl.name}</span>`:'' }
    ${cl?`<span class="ctag ctag-type">${cl.type}</span>`:''}
    ${sc?`<span class="ctag ctag-type">${sc.name}</span>`:''}
    <span class="ctag ctag-type">CM +${cm}</span>
  </div>
  ${C.concept?`<div class="concept-text">"${esc(C.concept.substring(0,160))}${C.concept.length>160?'…':''}"</div>`:''}
</div>
</div>
</div>

<!-- CORE COMBAT STATS -->
<div class="section">
<div class="section-title">Combat Statistics</div>
<div class="stats-row">
  ${box('Max HP',hp,'Class + Might')}
  ${box('Prec. Defense',pd,'8+CM+Agi+Int')}
  ${box('Area Defense',ad,'8+CM+Mgt+Cha')}
  ${box('Save DC',dc,'10+CM+Prime')}
  ${box('Atk / Spell',atk,'CM + Prime')}
  ${box('Prime Mod',pm()>=0?'+'+pm():pm(),'Highest attr')}
</div>
<div class="sec-stats">
  ${box('Grit Points',grit,'2 + Charisma')}
  ${box('SP / MP',`${sp} / ${mp}`,'Stamina / Mana')}
  ${box('Move Speed','5','Spaces')}
  ${box('Rest Points',hp,'= Max HP')}
</div>
<div style="display:flex;align-items:center;gap:16px;margin-top:10px;padding:8px 12px;background:#fff3f3;border-radius:6px;border:1px solid #f5c5c5">
  <span class="death-bubble">−${Math.abs(pm())}</span>
  <div>
    <div style="font-size:11px;font-weight:700;color:#c0392b;text-transform:uppercase;letter-spacing:.5px">Death's Door</div>
    <div style="font-size:11px;color:#888;margin-top:2px">When HP reaches −${Math.abs(pm())} (= Prime Modifier), the character dies.</div>
  </div>
  <div style="margin-left:auto;font-size:11px;color:#888">
    Jump: <strong>${jump} Spaces</strong><br>Combat Mastery: <strong>+${cm}</strong>
  </div>
</div>
</div>

<!-- ATTRIBUTES -->
<div class="section">
<div class="section-title">Attributes & Saves</div>
<div class="attrs-grid">
  ${attrBox('Might','might')}
  ${attrBox('Agility','agility')}
  ${attrBox('Charisma','charisma')}
  ${attrBox('Intelligence','intelligence')}
</div>
<div style="font-size:11px;color:#888;margin-top:8px">Attribute Cap: +${getAttrCap(C.level)} at Level ${C.level} · Skill Mastery Cap: ${skCap} (+${skBonus})</div>
</div>

<!-- SKILLS & TRADES -->
${skList.length||trList.length?`<div class="two-col">
${skList.length?`<div class="section">
<div class="section-title">Skills (${skCap} — +${skBonus})</div>
<div class="skills-grid">
${skList.map(sk=>`<div class="skill-row">
<div class="sk-name">${sk.name}</div>
<div class="sk-attr">${sk.attr}</div>
<div class="sk-dots">${[...Array(3)].map((_,i)=>`<div class="sk-dot ${sk.lv>i?'fill':''}"></div>`).join('')}</div>
<div class="sk-bonus">+${sk.lv*2}</div>
</div>`).join('')}
</div></div>`:'<div></div>'}
${trList.length?`<div class="section">
<div class="section-title">Trades</div>
${trList.map(tr=>`<div class="skill-row"><div class="sk-name">${tr.name}</div></div>`).join('')}
</div>`:'<div></div>'}
</div>`:''}

<!-- EQUIPMENT -->
${eqRows?`<div class="section">
<div class="section-title">Equipment</div>
<table class="dc20">
<thead><tr><th>Item</th><th>Type</th><th>Properties</th></tr></thead>
<tbody>${eqRows}</tbody>
</table></div>`:''}

<!-- SPELLS -->
${spellRows?`<div class="section">
<div class="section-title">Spells Known</div>
<table class="dc20">
<thead><tr><th>Spell</th><th>School</th><th>Source</th><th>Cost</th><th>Range</th><th>Description</th></tr></thead>
<tbody>${spellRows}</tbody>
</table></div>`:''}

<!-- MANEUVERS -->
${manRows?`<div class="section">
<div class="section-title">Maneuvers Known</div>
<table class="dc20">
<thead><tr><th>Maneuver</th><th>Type</th><th>Cost</th><th>Description</th></tr></thead>
<tbody>${manRows}</tbody>
</table></div>`:''}

<!-- TALENTS -->
${talentRows?`<div class="section">
<div class="section-title">Talents</div>
<table class="dc20">
<thead><tr><th>Talent</th><th>Type</th><th>Description</th></tr></thead>
<tbody>${talentRows}</tbody>
</table></div>`:''}

<!-- ANCESTRY & CLASS NOTES -->
<div class="two-col">
<div class="section">
<div class="section-title">Ancestry</div>
<div style="font-size:13px;font-weight:700;margin-bottom:4px">${a1?a1.name:'—'}${a2?' / '+a2.name:''}</div>
${a1?`<div style="font-size:11px;color:#666;margin-bottom:6px">${a1.traits}</div>`:''}
${a2?`<div style="font-size:11px;color:#666">${a2.traits}</div>`:''}
<div style="margin-top:10px;font-size:11px;color:#999">Ancestry Points: 5 base +${C.level>=7?4:C.level>=4?2:0} from levels</div>
</div>
<div class="section">
<div class="section-title">Class & Subclass</div>
<div style="font-size:13px;font-weight:700;margin-bottom:4px">${cl?cl.name:'—'}</div>
${cl?`<div style="font-size:11px;color:#666;margin-bottom:6px">${cl.desc}</div>`:''}
${sc?`<div style="font-size:12px;font-weight:700;color:#5c3d8f;margin-bottom:3px">${sc.name}${sc.paragon?' <span style="font-size:10px;background:#FAECE7;color:#993C1D;padding:1px 5px;border-radius:3px;font-weight:700">Paragon</span>':''}</div>`:''}
${sc?`<div style="font-size:11px;color:#666">${sc.desc}</div>`:''}
</div>
</div>

<!-- NOTES AREA -->
<div class="section">
<div class="section-title">Notes</div>
<div style="min-height:80px;border:0.5px dashed #ccc;border-radius:6px;padding:10px;font-size:12px;color:#ccc">
${C.concept?esc(C.concept):'Use this space for additional notes, backstory, or in-game details…'}
</div>
</div>

<div class="footer">DC20 Beta 0.10 by <span>The Dungeon Coach</span> · Generated ${new Date().toLocaleDateString()} · Unofficial fan tool</div>
</div>
</body>
</html>`;

  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`${(C.name||'character').replace(/\s+/g,'_')}_dc20_sheet.html`;a.click();
  URL.revokeObjectURL(url);toast('DC20 character sheet exported!');
};

renderAll();
</script>
</body>
</html>
